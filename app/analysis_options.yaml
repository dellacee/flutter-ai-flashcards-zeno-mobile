include: package:very_good_analysis/analysis_options.yaml

analyzer:
  plugins:
    - custom_lint
  exclude:
    - '**/*.g.dart'
    - '**/*.freezed.dart'
    - '**/firebase_options.dart'
    - 'lib/generated_plugin_registrant.dart'
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    # Allow grouping dependencies by purpose (state, firebase, ui) instead of
    # forcing global alphabetical order — clearer for humans, lint adds no value.
    sort_pub_dependencies: false
    # Documentation enforced on public APIs of feature code, not the app shell.
    # Re-enable per-package later if we extract reusable packages.
    public_member_api_docs: false
