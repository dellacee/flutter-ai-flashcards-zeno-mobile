org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation: workaround for cross-drive bug
# (RelocatableFileToPathConverter fails when pub cache on C: and project on D:).
# Slower per-build (~20-30%) but reliable. Re-evaluate if pub cache moved.
kotlin.incremental=false
