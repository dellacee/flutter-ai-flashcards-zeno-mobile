name: zeno
description: "Zeno - AI Learning Companion. Mobile-first AI flashcard app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_app_check: ^0.3.1+6
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Auth providers
  google_sign_in: ^6.2.1

  # Local DB / persistence
  # Isar deferred to V1.1+ (analyzer conflict with freezed; Firestore SDK has
  # built-in offline persistence on mobile, sufficient for V1.0).
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Network / files
  dio: ^5.5.0+1

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.0

  # Misc
  intl: ^0.20.0
  logging: ^1.2.0
  uuid: ^4.4.2
  collection: ^1.18.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.13
  very_good_analysis: ^6.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  # firebase_auth_mocks: deferred — version conflict with firebase_core 3.x.
  # Will mock FirebaseAuth manually with mocktail when needed in auth tests.

flutter:
  uses-material-design: true
  generate: true
